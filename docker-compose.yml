name: kryptex

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: kryptex
    container_name: kryptex
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    command: >
      sh -c "python manage.py migrate && 
             python manage.py runserver_plus --cert-file cert.crt 0.0.0.0:8000"
    restart: unless-stopped
