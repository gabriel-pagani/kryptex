{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Kryptex</title>

    <link href="{% static 'images/favicon.ico' %}" rel="icon" />
    <link href="{% static 'css/reset.css' %}" rel="stylesheet" />
    <link href="{% static 'css/index.css' %}" rel="stylesheet" />
  </head>

  <body>
    <header class="topbar">
      <div class="topbar__left">
        <img
          class="topbar__logo"
          src="{% static 'images/favicon.ico' %}"
          alt="Kryptex"
          decoding="async"
        />
        <h1 class="brand">Kryptex</h1>
      </div>
    </header>

    <main class="container">
      <section class="card" style="max-width: 520px; margin: 40px auto;">
        <div class="card__header card__header--center">
          <h2>Acessar Cofre</h2>
        </div>

        {% if form.errors %}
          <div class="alert alert--error" role="alert" aria-live="polite">
            Usuário ou senha inválidos.
          </div>
        {% endif %}

        <form method="post" action="{% url 'app:login' %}" class="form">
          {% csrf_token %}
          <input type="hidden" name="next" value="{{ next }}" />

          <div class="form__group">
            <label for="id_username">Usuário</label>
            <input id="id_username" type="text" name="username" autocomplete="username" required />
          </div>

          <div class="form__group">
            <label for="id_password">Senha</label>
            <input id="id_password" type="password" name="password" autocomplete="current-password" required />
          </div>

          <div class="modal__actions">
            <button type="submit" class="btn btn--primary btn--block">Entrar</button>
          </div>
        </form>
      </section>
    </main>
  </body>
</html>
